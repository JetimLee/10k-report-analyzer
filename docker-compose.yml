services:
  dashboard:
    build: .
    image: ten-k-analyzer:latest
    container_name: ten-k-analyzer
    ports:
      - "8501:8501"
    volumes:
      # Bind the project dir so ten_k.db, .sic_cache.json, and pipeline
      # outputs all persist on the host with no extra path plumbing.
      - .:/app
      # Shadow the host's .venv with an empty anonymous volume so Bruin/Poetry
      # don't try to reuse a broken macOS virtualenv inside the Linux container.
      - /app/.venv
    environment:
      # SEC requires a User-Agent identifying your app + contact email.
      SEC_USER_AGENT: ${SEC_USER_AGENT:-10KAnalyzer contact@example.com}
    restart: unless-stopped

  pipeline:
    build: .
    image: ten-k-analyzer:latest
    container_name: ten-k-pipeline
    volumes:
      - .:/app
      - /app/.venv
    environment:
      SEC_USER_AGENT: ${SEC_USER_AGENT:-10KAnalyzer contact@example.com}
    command: ["bruin", "run", "."]
    profiles: ["run"]

  # One-shot: embed Item 1 (Business) for ~500 S&P 500 tickers into
  # analytics.sec_universe_embeddings. Takes ~1 hour due to SEC rate limits.
  # Re-run to top up with new 10-K filings (idempotent).
  seed-universe:
    build: .
    image: ten-k-analyzer:latest
    container_name: ten-k-seed
    volumes:
      - .:/app
      - /app/.venv
    environment:
      SEC_USER_AGENT: ${SEC_USER_AGENT:-10KAnalyzer contact@example.com}
    command: ["python", "scripts/seed_universe_embeddings.py"]
    profiles: ["seed"]
