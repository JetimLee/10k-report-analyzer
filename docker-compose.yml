services:
  dashboard:
    build: .
    image: ten-k-analyzer:latest
    container_name: ten-k-analyzer
    ports:
      - "8501:8501"
    volumes:
      # Bind the project dir so ten_k.db, .sic_cache.json, tickers.csv, and
      # pipeline outputs all persist on the host with no extra path plumbing.
      - .:/app
      # Shadow the host's .venv with an empty anonymous volume so Bruin/Poetry
      # don't try to reuse a broken macOS virtualenv inside the Linux container.
      - /app/.venv
    restart: unless-stopped

  pipeline:
    build: .
    image: ten-k-analyzer:latest
    container_name: ten-k-pipeline
    volumes:
      - .:/app
      - /app/.venv
    command: ["bruin", "run", "."]
    profiles: ["run"]
